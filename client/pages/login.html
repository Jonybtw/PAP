<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Iniciar Sessão | RouteWise</title>

	<link rel="stylesheet" href="../css/main.css">
	<link rel="stylesheet" href="../css/vars.css">

	<link rel="stylesheet" href="../css/pages/login.css">
</head>
<body>
	<section id="navbar">
		<h1>RouteWise</h1>
	</section>
	<section id="login-form">
		<form action="login.html" method="post" id="login" autocomplete="off">
			<h3>Iniciar Sessão</h3>
			<input type="text" name="username" placeholder="Nome de utilizador">
			<input type="password" name="password" placeholder="Palavra-Passe">
			<input type="submit" value="Iniciar Sessão">
			<section>
				<input type="checkbox">
				<label>Relembrar deste dispositivo</label>
			</section>
		</form>
	</section>
	<script src="../queries/login.js"></script>
</body>
</html>
